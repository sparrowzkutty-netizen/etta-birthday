<!DOCTYPE html>
<html>
<head>
    <title>🔐 Private Birthday Surprise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at top, #0a0f2a, #020414);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }

        /* Saturn */
        .saturn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 60px;
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Mountains */
        .mountains {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, #030617, transparent);
            clip-path: polygon(0% 100%, 5% 70%, 10% 85%, 15% 60%, 20% 75%, 25% 50%, 30% 65%, 35% 45%, 40% 60%, 45% 40%, 50% 55%, 55% 35%, 60% 50%, 65% 30%, 70% 45%, 75% 25%, 80% 40%, 85% 20%, 90% 35%, 95% 15%, 100% 30%, 100% 100%);
            z-index: 1;
        }

        .login-box {
            background: rgba(20, 30, 60, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid #4d94ff;
            border-radius: 50px;
            padding: 50px 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px #4d94ff; }
            to { box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 60px #6db3ff; }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #4d94ff;
        }

        .lock-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: unlock 2s infinite;
        }

        @keyframes unlock {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 30px gold; }
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #b0c6e0;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.2rem;
            border: 2px solid #4d94ff;
            border-radius: 60px;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 25px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: #80bfff;
            box-shadow: 0 0 30px #4d94ff;
            background: rgba(255,255,255,0.15);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        button {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.3rem;
            background: linear-gradient(145deg, #4d94ff, #2d5f9e);
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid #80bfff;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px #4d94ff;
            background: linear-gradient(145deg, #5fa5ff, #3d6fae);
        }

        .error {
            color: #ff8a8a;
            margin-top: 20px;
            font-size: 1.1rem;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .hint {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #7f9bc0;
        }
    </style>
</head>
<body>
    <!-- Stars -->
    <div class="stars" id="stars"></div>

    <!-- Saturn -->
    <div class="saturn">🪐</div>

    <!-- Mountains -->
    <div class="mountains"></div>

    <div class="login-box">
        <div class="lock-icon">🔐✨</div>
        <h1>Private Surprise</h1>
        <p>This birthday surprise is just for Etta 💙</p>

        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" required autofocus>
            <button type="submit">Unlock Surprise ✨</button>
        </form>

        {% if error %}
            <div class="error">❌ Wrong password! Try again.</div>
        {% endif %}

        <div class="hint">💡 Hint: It's the name I call you 😉</div>
    </div>

    <script>
        // Generate stars
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }

        generateStars();
    </script>
</body>
</html>
