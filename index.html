<!DOCTYPE html>
<html>
<head>
<title>✨ Birthday Surprise ✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:black;
    color:white;
    text-align:center;
}

.page{display:none;}
.active{display:block;}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:20px;
    background:#4da6ff;
    color:white;
    cursor:pointer;
}

.gift{
    margin:15px;
    padding:15px;
    border:2px solid white;
    border-radius:20px;
    cursor:pointer;
}

.gift img{
    width:150px;
    height:150px;
    border-radius:15px;
    margin-top:10px;
}

#msg{
    font-size:20px;
    max-width:600px;
    margin:20px auto;
    line-height:1.6;
    text-shadow:0 0 10px #4da6ff;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="song" loop>
  <source src="neenenacha.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h1>✨ Happy Birthday Etta 💙</h1>
<button onclick="startSurprise()">Start</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<h2>Who is special today?</h2>
<button onclick="wrong()">Me</button>
<button onclick="nextPage('page3')">Etta 💙</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<h2>What day is today?</h2>
<button onclick="wrong()">Normal</button>
<button onclick="nextPage('page4')">Birthday 🎂</button>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
<h2>🎁 Tap Gifts</h2>

<div class="gift" onclick="openGift(this,'You always make me smile 💙','photos/pic1.jpg')">🎁 Tap Me</div>
<div class="gift" onclick="openGift(this,'You are very special 💫','photos/pic2.jpg')">🎁 Tap Me</div>
<div class="gift" onclick="openGift(this,'Thank you for being there 🫶','photos/pic3.jpg')">🎁 Tap Me</div>
<div class="gift" onclick="openGift(this,'Beautiful memories ✨','photos/pic4.jpg')">🎁 Tap Me</div>
<div class="gift" onclick="openGift(this,'Always with you 💙','photos/pic5.jpg')">🎁 Tap Me</div>
<div class="gift" onclick="openGift(this,'Happy Birthday 🎂','photos/pic6.jpg')">🎁 Tap Me</div>

<button onclick="nextPage('page5')">Next</button>
</div>

<!-- PAGE 5 -->
<div id="page5" class="page">
<h2>💌 A Message For You</h2>
<p id="msg"></p>
<button onclick="nextPage('page6')">Next</button>
</div>

<!-- PAGE 6 -->
<div id="page6" class="page">
<h1>🎉 Happy Birthday 🎉</h1>
<button onclick="nextPage('page7')">Celebrate</button>
</div>

<!-- PAGE 7 -->
<div id="page7" class="page">
<h2>🎂 Cake</h2>
<button onclick="blow()">Blow Candles</button>
<button onclick="cut()">Cut Cake</button>
<p id="cakeMsg"></p>
<button onclick="nextPage('page8')">Next</button>
</div>

<!-- PAGE 8 -->
<div id="page8" class="page">
<h2>💙 Final</h2>
<p>Once again Happy Birthday Etta 💙</p>
</div>

<script>
function nextPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="page5"){
    document.getElementById("msg").innerHTML="";
    i=0;
    type();
}
}

function startSurprise(){
document.getElementById("song").play();
nextPage('page2');
}

function wrong(){
alert("Wrong 😅");
}

function openGift(el,msg,img){
el.innerHTML=`
<p>${msg}</p>
<img src="${img}">
`;
}

function blow(){
document.getElementById("cakeMsg").innerText="Wish made ✨";
}

function cut(){
document.getElementById("cakeMsg").innerText="Cake cut 🎂";
}

// 💌 TYPING MESSAGE
let text=`Happiest Birthday Etta 💙

Neenga enaku romba special…
Unga presence irundhaale enaku calm & happy feel aagudhu 🫂🫶🏻

The way you understand me means a lot to me 🧿💙
Always stay the same amazing person…

Forever special to me 🎀✨`;

let i=0;

function type(){
if(i<text.length){
if(text.charAt(i)==="\n"){
document.getElementById("msg").innerHTML+="<br>";
}else{
document.getElementById("msg").innerHTML+=text.charAt(i);
}
i++;
setTimeout(type,50);
}
}
</script>

</body>
</html>
